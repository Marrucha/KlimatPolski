<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Vibrant Yellow Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>

    <!-- Light Soft Grey Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <!-- Blue Raindrop Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Lightning Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Sun Rays prominently peeking out from top-right -->
  <g stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round">
    <line x1="44" y1="2" x2="44" y2="7"/>
    <line x1="56" y1="6" x2="52" y2="10"/>
    <line x1="60" y1="17" x2="55" y2="17"/>
    <line x1="56" y1="28" x2="52" y2="25"/>
    <line x1="32" y1="6" x2="36" y2="9"/>
  </g>

  <!-- Sun Disk -->
  <circle cx="44" cy="17" r="14" fill="url(#sunGrad)"/>

  <!-- Light Soft Grey Cloud -->
  <path d="M14 43h30a11 11 0 0 0 1-21.96 13 13 0 0 0-24.8-4.2A9.5 9.5 0 0 0 14 43z" fill="url(#cloudGrad)" filter="url(#shadow)"/>

  <!-- Raindrops -->
  <path d="M18 49c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>
  <path d="M40 49c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>

  <!-- Lightning Bolt -->
  <polygon points="31,43 27,51 31,51 28,60 36,49 31,49" fill="url(#boltGrad)" filter="url(#shadow)"/>
</svg>
