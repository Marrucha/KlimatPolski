<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Yellow Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>

    <!-- Grey Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>

    <!-- Blue Raindrop Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sun Rays -->
  <g stroke="#eab308" stroke-width="3" stroke-linecap="round">
    <line x1="22" y1="5" x2="22" y2="8"/>
    <line x1="9" y1="18" x2="12" y2="20"/>
    <line x1="5" y1="31" x2="8" y2="31"/>
    <line x1="35" y1="9" x2="33" y2="12"/>
  </g>

  <!-- Yellow Sun -->
  <circle cx="22" cy="22" r="13" fill="url(#sunGrad)"/>

  <!-- Grey Cloud -->
  <path d="M18 40h28a11 11 0 0 0 1-21.96 13 13 0 0 0-24.8-4.2A9.5 9.5 0 0 0 18 40z" fill="url(#cloudGrad)" filter="url(#shadow)"/>

  <!-- Blue Raindrops -->
  <path d="M22 46c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>
  <path d="M32 49c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>
  <path d="M42 46c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>
</svg>
