<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Yellow Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>

    <!-- Grey Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <!-- Blue Raindrop Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sun Rays peeking out behind top-right of cloud -->
  <g stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round">
    <line x1="42" y1="4" x2="42" y2="8"/>
    <line x1="53" y1="8" x2="50" y2="11"/>
    <line x1="57" y1="19" x2="53" y2="19"/>
    <line x1="53" y1="30" x2="50" y2="27"/>
    <line x1="31" y1="8" x2="34" y2="11"/>
  </g>

  <!-- Yellow Sun (positioned at top-right, peeking out) -->
  <circle cx="42" cy="19" r="13" fill="url(#sunGrad)"/>

  <!-- Grey Cloud (overlapping lower half of the sun) -->
  <path d="M16 42h28a11 11 0 0 0 1-21.96 13 13 0 0 0-24.8-4.2A9.5 9.5 0 0 0 16 42z" fill="url(#cloudGrad)" filter="url(#shadow)"/>

  <!-- Blue Raindrops -->
  <path d="M20 48c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>
  <path d="M30 51c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>
  <path d="M40 48c0 1.8 1.3 3.2 3 3.2s3-1.4 3-3.2c0-1.8-3-5.5-3-5.5s-3 3.7-3 5.5z" fill="url(#dropGrad)"/>
</svg>
