name: Bulk Fetch ERA5 (50 lat)

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'Wybierz miasto'
        required: true
        default: 'Warszawa (37)'
        type: choice
        options:
          - Warszawa (37)
          - Kraków (38)
          - Włodawa (1)
          - Lublin (2)
          - Wrocław (39)
          - Zamość (4)
          - Chełm (5)
          - Sandomierz (6)
          - Biała Podlaska (3)
          - Łódź (40)
          - Suwałki (41)
          - Gdańsk (42)
          - Szczecin (43)
          - Rzeszów (44)
          - Olsztyn (45)
          - Kielce (46)
          - Zakopane (47)
          - Karpacz (48)
          - Kołobrzeg (49)
          - Środek zatoki Gdańskiej (50)
          - Świnoujście (51)
          - Władysławowa (52)
          - 20km na północ od Władysławowa (53)

jobs:
  bulk-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 godzin dla free tier

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract city ID
        id: extract
        run: |
          CITY_INPUT="${{ github.event.inputs.city }}"
          CITY_ID=$(echo "$CITY_INPUT" | grep -oP '\(\K[0-9]+(?=\))')
          echo "city_id=$CITY_ID" >> $GITHUB_OUTPUT

      - name: Fetch ERA5 data (yearly chunks)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          CDS_UID: ${{ secrets.CDS_UID }}
          CDS_API_KEY: ${{ secrets.CDS_API_KEY }}
        run: |
          python scripts/bulk_fetch_era5.py \
            --city-id "${{ steps.extract.outputs.city_id }}" \
            --start-year 1950 \
            --end-year 2026 \
            --chunk-size 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-logs
          path: logs/
          retention-days: 7
