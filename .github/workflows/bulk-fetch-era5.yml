name: Bulk Fetch ERA5 (50 lat)

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'Wybierz miasto'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - Warszawa (37)
          - Kraków (38)
          - Włodawa (1)
          - Lublin (2)
          - Wrocław (39)
          - Zamość (4)
          - Chełm (5)
          - Sandomierz (6)
          - Biała Podlaska (3)
          - Łódź (40)
          - Suwałki (41)
          - Gdańsk (42)
          - Szczecin (43)
          - Rzeszów (44)
          - Olsztyn (45)
          - Kielce (46)
          - Zakopane (47)
          - Karpacz (48)
          - Kołobrzeg (49)
          - Środek zatoki Gdańskiej (50)
          - Świnoujście (51)
          - Władysławowa (52)
          - 20km na północ od Władysławowa (53)
      period:
        description: 'Wybierz okres (10 lat)'
        required: true
        default: '2017-2026'
        type: choice
        options:
          - 2017-2026 (10 lat)
          - 2007-2016 (10 lat)
          - 1997-2006 (10 lat)
          - 1987-1996 (10 lat)
          - 1977-1986 (10 lat)
          - 1967-1976 (10 lat)
          - 1957-1966 (10 lat)
          - 1950-1956 (7 lat)

jobs:
  bulk-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 godzin dla free tier

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract parameters
        id: extract
        run: |
          CITY_INPUT="${{ github.event.inputs.city }}"
          if [[ "$CITY_INPUT" == "all" ]]; then
            echo "city_id=all" >> $GITHUB_OUTPUT
          else
            CITY_ID=$(echo "$CITY_INPUT" | grep -oP '\(\K[0-9]+(?=\))')
            echo "city_id=$CITY_ID" >> $GITHUB_OUTPUT
          fi

          PERIOD_INPUT="${{ github.event.inputs.period }}"
          case "$PERIOD_INPUT" in
            "2017-2026"*) echo "start_year=2017" >> $GITHUB_OUTPUT; echo "end_year=2026" >> $GITHUB_OUTPUT;;
            "2007-2016"*) echo "start_year=2007" >> $GITHUB_OUTPUT; echo "end_year=2016" >> $GITHUB_OUTPUT;;
            "1997-2006"*) echo "start_year=1997" >> $GITHUB_OUTPUT; echo "end_year=2006" >> $GITHUB_OUTPUT;;
            "1987-1996"*) echo "start_year=1987" >> $GITHUB_OUTPUT; echo "end_year=1996" >> $GITHUB_OUTPUT;;
            "1977-1986"*) echo "start_year=1977" >> $GITHUB_OUTPUT; echo "end_year=1986" >> $GITHUB_OUTPUT;;
            "1967-1976"*) echo "start_year=1967" >> $GITHUB_OUTPUT; echo "end_year=1976" >> $GITHUB_OUTPUT;;
            "1957-1966"*) echo "start_year=1957" >> $GITHUB_OUTPUT; echo "end_year=1966" >> $GITHUB_OUTPUT;;
            "1950-1956"*) echo "start_year=1950" >> $GITHUB_OUTPUT; echo "end_year=1956" >> $GITHUB_OUTPUT;;
          esac

      - name: Fetch ERA5 data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          CDS_UID: ${{ secrets.CDS_UID }}
          CDS_API_KEY: ${{ secrets.CDS_API_KEY }}
        run: |
          python scripts/bulk_fetch_era5.py \
            --city-id "${{ steps.extract.outputs.city_id }}" \
            --start-year ${{ steps.extract.outputs.start_year }} \
            --end-year ${{ steps.extract.outputs.end_year }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-logs
          path: logs/
          retention-days: 7
